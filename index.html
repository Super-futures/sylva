<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sylva</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Karla:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;background:#0a1e10;
  font-family:'Karla',sans-serif;color:#e8f4ea;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
*{-webkit-tap-highlight-color:transparent!important}
*:focus{outline:none!important}
.cur{position:fixed;width:7px;height:7px;background:#8fd49a;border-radius:50%;
  pointer-events:none;z-index:9999;box-shadow:0 0 8px #4aaa57;
  transform:translate(-50%,-50%);transition:opacity 0.5s;display:none}
@media(hover:hover){html{cursor:none}.cur{display:block}}
.cur.off{opacity:0}
canvas{position:fixed;inset:0;width:100%;height:100%;transition:opacity 0.8s ease}
#bg{z-index:0}#mid{z-index:1}#fg{z-index:2}
.vignette{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse 84% 74% at 50% 50%,
    transparent 20%,rgba(2,8,4,0.35) 58%,rgba(2,8,4,0.90) 100%);
  transition:opacity 0.8s ease}
.screen{position:fixed;inset:0;z-index:10;display:flex;
  align-items:center;justify-content:center;transition:opacity 1.6s ease}
.screen.vis{pointer-events:all;opacity:1}
.screen.hid{opacity:0;pointer-events:none}
/* ENTRY */
#entry{flex-direction:column;text-align:center}
.koru{width:68px;height:68px;margin:0 auto 24px}
.koru svg{width:100%;height:100%;
  filter:drop-shadow(0 0 14px rgba(74,170,87,0.55));
  animation:kb 5s ease-in-out infinite}
@keyframes kb{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 10px rgba(74,170,87,0.35))}
  50%{transform:scale(1.06);filter:drop-shadow(0 0 22px rgba(74,170,87,0.80))}}
.t1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.2rem,10vw,6rem);
  font-weight:300;letter-spacing:0.18em;color:#e8f4ea;line-height:1;
  opacity:0;animation:fu 1.6s ease forwards;animation-delay:0.3s}
.t-desc{font-family:'Cormorant Garamond',serif;
  font-size:clamp(0.88rem,1.8vw,1.05rem);font-weight:300;font-style:italic;
  color:#8fd49a;letter-spacing:0.04em;line-height:1.7;max-width:320px;
  margin-top:16px;opacity:0;animation:fu 1.6s ease forwards;animation-delay:0.7s}
.enter-btn{margin-top:44px;padding:12px 50px;background:transparent;
  border:1px solid rgba(74,170,87,0.36);color:#8fd49a;
  font-family:'Karla',sans-serif;font-size:0.75rem;font-weight:300;
  letter-spacing:0.38em;text-transform:uppercase;
  transition:all 0.4s;position:relative;overflow:hidden;cursor:pointer;
  opacity:0;animation:fu 1.6s ease forwards;animation-delay:1.2s}
.enter-btn::before{content:'';position:absolute;inset:0;
  background:rgba(74,170,87,0.07);transform:translateX(-100%);transition:transform 0.4s}
.enter-btn:hover,.enter-btn:active{border-color:rgba(74,170,87,0.80);color:#e8f4ea}
.enter-btn:hover::before,.enter-btn:active::before{transform:translateX(0)}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* TOP BAR */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 36px;pointer-events:none}
.top-bar>*{pointer-events:all}
.sess-title{font-family:'Cormorant Garamond',serif;font-size:0.90rem;font-style:italic;
  color:#e8f4ea;opacity:0.28;letter-spacing:0.05em;pointer-events:none}
.leave-btn{padding:5px 15px;background:transparent;
  border:1px solid rgba(74,170,87,0.14);color:#8fd49a;
  font-family:'Karla',sans-serif;font-size:0.64rem;font-weight:300;
  letter-spacing:0.22em;text-transform:uppercase;
  transition:all 0.35s;opacity:0.45;cursor:pointer}
.leave-btn:hover,.leave-btn:active{border-color:rgba(74,170,87,0.50);opacity:1;color:#e8f4ea}
/* GUIDANCE */
.guidance{position:fixed;inset:0;z-index:16;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.g1,.g2,.g3{font-family:'Cormorant Garamond',serif;font-style:italic;
  color:#e8f4ea;opacity:0;text-align:center;
  transition:opacity 2.2s ease;text-shadow:0 0 40px rgba(2,8,4,1);
  max-width:460px;padding:0 24px}
.g1{font-size:clamp(1.0rem,2.3vw,1.45rem);font-weight:300;letter-spacing:0.07em}
.g2{font-size:clamp(0.70rem,1.2vw,0.86rem);font-style:normal;
  letter-spacing:0.24em;text-transform:uppercase;color:#8fd49a}
.g3{font-size:clamp(0.86rem,1.8vw,1.12rem);color:#8fd49a;transition:opacity 2.6s ease}
.g1.on{opacity:0.68}.g2.on{opacity:0.28}.g3.on{opacity:0.38}
/* PANEL */
.settings-btn{position:fixed;bottom:22px;right:28px;z-index:25;
  width:32px;height:32px;border-radius:50%;
  background:rgba(3,10,4,0.72);border:1px solid rgba(74,170,87,0.18);
  color:#8fd49a;font-size:0.85rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;opacity:0.50;cursor:pointer}
.settings-btn:hover,.settings-btn:active{opacity:1;border-color:rgba(74,170,87,0.50)}
.panel{position:fixed;bottom:64px;right:20px;z-index:24;width:200px;
  background:rgba(3,10,4,0.93);border:1px solid rgba(74,170,87,0.13);
  backdrop-filter:blur(20px);padding:16px 14px 12px;
  display:flex;flex-direction:column;gap:12px;
  transition:opacity 0.3s,transform 0.3s}
.panel.hid{opacity:0;pointer-events:none;transform:translateY(6px)}
.p-sec{font-size:0.56rem;letter-spacing:0.3em;text-transform:uppercase;
  color:#4aaa57;opacity:0.58}
.p-row{display:flex;gap:4px}
.p-btn{flex:1;padding:5px 0;background:transparent;
  border:1px solid rgba(74,170,87,0.14);color:#8fd49a;
  font-family:'Karla',sans-serif;font-size:0.58rem;font-weight:300;
  letter-spacing:0.1em;transition:all 0.25s;text-align:center;cursor:pointer}
.p-btn.on{border-color:#4aaa57;color:#e8f4ea;background:rgba(74,170,87,0.07)}
.p-btn:hover,.p-btn:active{border-color:rgba(74,170,87,0.40)}
.p-div{height:1px;background:rgba(74,170,87,0.07)}
/* CLOSING */
#closing{flex-direction:column;text-align:center;gap:14px;padding:40px}
.cl-h{font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.5rem,4.5vw,2.5rem);font-weight:300;font-style:italic;
  color:#e8f4ea;line-height:1.45}
.cl-sub{font-size:0.84rem;font-weight:300;color:#8fd49a;opacity:0.55;letter-spacing:0.04em}
.return-btn{margin-top:8px;padding:10px 38px;background:transparent;
  border:1px solid rgba(74,170,87,0.26);color:#8fd49a;
  font-family:'Karla',sans-serif;font-size:0.72rem;font-weight:300;
  letter-spacing:0.3em;text-transform:uppercase;transition:all 0.35s;cursor:pointer}
.return-btn:hover,.return-btn:active{border-color:#4aaa57;color:#e8f4ea}
</style>
</head>
<body>
<div class="cur" id="cur"></div>
<canvas id="bg"></canvas>
<canvas id="mid"></canvas>
<canvas id="fg"></canvas>
<div class="vignette" id="vignette"></div>

<!-- ENTRY -->

<div class="screen vis" id="entry">
  <div style="text-align:center;display:flex;flex-direction:column;align-items:center">
    <div class="koru">
      <svg viewBox="0 0 80 80" fill="none">
        <path d="M40 72V22" stroke="#4aaa57" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M40 50C30 43 18 43 13 33" stroke="#4aaa57" stroke-width="1.1" stroke-linecap="round" opacity=".85"/>
        <path d="M40 50C50 43 62 43 67 33" stroke="#4aaa57" stroke-width="1.1" stroke-linecap="round" opacity=".85"/>
        <path d="M40 40C32 35 24 37 20 29" stroke="#4aaa57" stroke-width=".85" stroke-linecap="round" opacity=".65"/>
        <path d="M40 40C48 35 56 37 60 29" stroke="#4aaa57" stroke-width=".85" stroke-linecap="round" opacity=".65"/>
        <path d="M40 31C35 28 32 23 30 18" stroke="#4aaa57" stroke-width=".65" stroke-linecap="round" opacity=".5"/>
        <path d="M40 31C45 28 48 23 50 18" stroke="#4aaa57" stroke-width=".65" stroke-linecap="round" opacity=".5"/>
        <circle cx="40" cy="9" r="3.5" stroke="#7fcf8a" stroke-width=".9" fill="none" opacity=".7"/>
      </svg>
    </div>
    <h1 class="t1">SYLVA</h1>
    <p class="t-desc">A digital forest where attention settles<br>and regulation follows.</p>
    <button class="enter-btn" id="enter-btn">Enter the forest</button>
  </div>
</div>

<!-- SESSION -->

<div class="screen hid" id="session">
  <div class="top-bar">
    <span class="sess-title">Sylva</span>
    <button class="leave-btn" id="leave-btn">Leave</button>
  </div>
  <div class="guidance">
    <div class="g1" id="g1">let your eyes follow the movement</div>
    <div class="g2" id="g2">let your breath soften</div>
    <div class="g3" id="g3"></div>
  </div>
  <button class="settings-btn" id="settings-btn">⛰</button>
  <div class="panel hid" id="panel">
    <div class="p-sec">Tracking</div>
    <div class="p-row">
      <button class="p-btn on" id="tr-settle">Settle</button>
      <button class="p-btn"    id="tr-focus">Focus</button>
    </div>
    <div class="p-div"></div>
    <div class="p-sec">Sound</div>
    <div class="p-row">
      <button class="p-btn"    id="sv-off">Off</button>
      <button class="p-btn on" id="sv-soft">Soft</button>
      <button class="p-btn"    id="sv-on">Full</button>
    </div>
    <div class="p-div"></div>
    <div class="p-sec">Mode</div>
    <div class="p-row">
      <button class="p-btn on" id="md-forest">Forest</button>
      <button class="p-btn"    id="md-listen">Listen</button>
    </div>
  </div>
</div>

<!-- CLOSING -->

<div class="screen hid" id="closing">
  <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px">
    <h2 class="cl-h">take what you need<br>let the rest fall away</h2>
    <p class="cl-sub">come back anytime</p>
    <button class="return-btn" id="return-btn">Return to the forest</button>
  </div>
</div>

<script>
'use strict';

// ── CURSOR ──────────────────────────────────────────────
const cur=document.getElementById('cur');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});

// ── CANVAS ──────────────────────────────────────────────
const bgC=document.getElementById('bg'),midC=document.getElementById('mid'),fgC=document.getElementById('fg');
const bgX=bgC.getContext('2d'),midX=midC.getContext('2d'),fgX=fgC.getContext('2d');
let W=0,H=0;
function resize(){
  W=bgC.width=midC.width=fgC.width=window.innerWidth;
  H=bgC.height=midC.height=fgC.height=window.innerHeight;
  buildScene();
}
window.addEventListener('resize',resize);

// ── PALETTE ─────────────────────────────────────────────
const PALS=[
  {sT:'#0a1e10',sM:'#122a16',sL:'#183620',rR:145,rG:220,rB:155},
  {sT:'#081808',sM:'#0f2210',sL:'#152816',rR:95, rG:185,rB:105},
  {sT:'#141808',sM:'#20220a',sL:'#262a0c',rR:182,rG:205,rB:68 },
  {sT:'#221208',sM:'#2e1808',sL:'#341c08',rR:218,rG:155,rB:65 },
];
let palT=0,palDrift=0;
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function lC(a,b,f){return(a+(b-a)*f)|0}
function lRgb(a,b,f){return[lC(a[0],b[0],f),lC(a[1],b[1],f),lC(a[2],b[2],f)]}
function getPal(){
  const t=Math.max(0,Math.min(0.9999,palT));
  const raw=t*(PALS.length-1),lo=Math.floor(raw),hi=Math.min(lo+1,PALS.length-1),f=raw-lo;
  const a=PALS[lo],b=PALS[hi];
  const lh=(ha,hb)=>{const r=lRgb(hexRgb(ha),hexRgb(hb),f);return`rgb(${r[0]},${r[1]},${r[2]})`};
  return{sT:lh(a.sT,b.sT),sM:lh(a.sM,b.sM),sL:lh(a.sL,b.sL),
    ray:[lC(a.rR,b.rR,f),lC(a.rG,b.rG,f),lC(a.rB,b.rB,f)]};
}

// ── SCENE DATA ───────────────────────────────────────────
let bgTrees=[],midTrees=[],fgTrees=[],ferns=[],rays=[],motes=[],birds=[];
const ENV_SPD=0.16,ENV_WIND=1.0;
const IDLE_DRIFT=0.65,IDLE_BS=0.35,IDLE_BI=0.5;
const CROSS_S={settle:[7.0,11.0],focus:[1.8,2.8]};
const CROSS_IV={settle:5500,focus:2200};
let trackingMode='settle',isSession=false;
// nextBirdT: timestamp after which a new group may be spawned via the timer path
// crossedSpawned: true once we've triggered the overlap-spawn for the current group
let nextBirdT=0,birdDir=true,crossedSpawned=false;
function rnd(a,b){return a+Math.random()*(b-a)}

const TC={
  kauri:{tr:'#2a1a0c',ca:['#0e2010','#162e18','#1e3e20','#265028','#2e6030','#387038']},
  rimu: {tr:'#1e1006',ca:['#0c1a0e','#122212','#182c18','#1e361e','#254224','#2c4e2a']},
  ponga:{tr:'#163018',ca:['#1e4020','#285428','#326430','#3c7438','#468440','#509048']},
};

// ── WIND FIELD ───────────────────────────────────────────
const WF={seed:Math.random()*1000,
  get(x,t){const td=t+Math.sin(t*0.07+this.seed)*0.5;
    return(Math.sin(x*0.002+td*0.8)+Math.sin(x*0.005-td*1.2)*0.5+Math.sin(x*0.01+td*2.5)*0.2)/1.7}};

// ── PHYSICS ──────────────────────────────────────────────
function initP(o,fern){
  o.pos=0;o.vel=0;o.acc=0;
  if(fern){o.mass=rnd(0.4,0.7);o.stiff=rnd(0.014,0.022);o.damp=rnd(0.92,0.95);}
  else    {o.mass=rnd(1.5,3.0);o.stiff=rnd(0.004,0.008);o.damp=rnd(0.88,0.92);}
}
function makeTree(layer){
  const yR=[[0.10,0.28],[0.26,0.42],[0.40,0.54]];
  const hR=[[0.42,0.70],[0.56,0.86],[0.60,0.96]];
  const wR=[[22,52],[34,78],[58,120]];
  const t={x:rnd(0,W),scrollX:rnd(0,W),
    baseY:H*rnd(yR[layer][0],yR[layer][1]),
    h:H*rnd(hR[layer][0],hR[layer][1]),
    w:rnd(wR[layer][0],wR[layer][1]),
    type:Math.random()>(layer===2?0.18:0.32)?'kauri':(Math.random()>0.5?'rimu':'ponga'),layer};
  initP(t,false);return t;
}
function buildScene(){
  if(!W||!H)return;
  bgTrees=[];midTrees=[];fgTrees=[];ferns=[];rays=[];motes=[];
  for(let i=0;i<28;i++)bgTrees.push(makeTree(0));
  for(let i=0;i<16;i++)midTrees.push(makeTree(1));
  for(let i=0;i<11;i++)fgTrees.push(makeTree(2));
  for(let i=0;i<88;i++){
    const f={x:rnd(0,W),scrollX:rnd(0,W),y:H*rnd(0.54,0.96),
      size:rnd(26,90),opacity:rnd(0.07,0.24),phase:rnd(0,Math.PI*2),
      hue:rnd(108,145),fronds:Math.floor(rnd(5,9))};
    initP(f,true);ferns.push(f);
  }
  for(let i=0;i<10;i++)rays.push({x:rnd(0.04,0.96),angle:rnd(-0.20,0.20),w:rnd(35,100),
    op:rnd(0.028,0.082),ph:rnd(0,Math.PI*2),
    dr1:rnd(0.000010,0.000025),da1:rnd(0.020,0.068),
    dr2:rnd(0.0000032,0.0000085),da2:rnd(0.007,0.022)});
  for(let i=0;i<24;i++)motes.push({x:rnd(0,W),y:rnd(H*0.08,H*0.70),r:rnd(0.6,2.8),
    ph:rnd(0,Math.PI*2),sxR:rnd(0.000028,0.000095),syR:rnd(0.000014,0.000055),op:rnd(0.025,0.075)});
  nextBirdT=0;crossedSpawned=false;
}

// ── PHYSICS UPDATE ───────────────────────────────────────
function updatePhysics(now){
  const t=now*0.001,bw=ENV_WIND*(isSession?1.0:IDLE_DRIFT);
  const bp=breathT/WT,phi=bp*Math.PI*2;
  const eb=0.9+0.18*Math.sin(phi),sb=Math.sin(phi*0.6+0.8)*0.14;
  // sum active gust contributions (bell-curve over prog 0→1)
  const gustStr=gusts.reduce((s,g)=>s+g.dir*g.str*Math.sin(g.prog*Math.PI),0);
  const df=[0.5,1.0,1.6,2.0];
  [[bgTrees,0],[midTrees,1],[fgTrees,2],[ferns,3]].forEach(([layer,d])=>{
    const dfv=df[d];
    layer.forEach(o=>{
      const ext=(WF.get(o.x+sb*W*0.2+d*120,t)+gustStr*dfv*0.18)*bw*eb*dfv;
      const spr=-o.stiff*o.pos-o.pos*0.002;
      o.acc=(ext+spr)/o.mass;o.vel=(o.vel+o.acc)*o.damp;o.pos+=o.vel;
    });
  });
}

// ── DRAW TREE ────────────────────────────────────────────
function drawTree(ctx,t){
  const c=TC[t.type],lean=t.pos*0.09;
  ctx.save();ctx.translate(t.scrollX+lean,t.baseY);
  const bw=t.w*0.09,tw=t.w*0.028;
  const tg=ctx.createLinearGradient(-bw,0,bw,0);
  tg.addColorStop(0,c.tr);tg.addColorStop(0.45,'#352010');tg.addColorStop(1,c.tr);
  ctx.fillStyle=tg;
  ctx.beginPath();ctx.moveTo(-bw,t.h*0.95);ctx.lineTo(-tw,0);
  ctx.lineTo(tw,0);ctx.lineTo(bw,t.h*0.95);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.10)';ctx.lineWidth=0.5;
  for(let i=0;i<3;i++){const bx=(-0.5+i*0.5)*bw*1.2;
    ctx.beginPath();ctx.moveTo(bx,0);ctx.lineTo(bx*0.35,t.h*0.92);ctx.stroke();}
  const lv=Math.max(2,t.type==='ponga'?3:(t.layer===0?3:4));
  for(let l=0;l<lv;l++){
    const fr=l/(lv-1);
    const lx=lean*(0.35+fr*0.55),ly=t.h*(0.04+fr*0.20);
    const lw=t.w*(0.72-fr*0.28),lh=t.h*(0.22+fr*0.04);
    const ci=Math.min(l+1,c.ca.length-1);
    const cg=ctx.createRadialGradient(lx,ly,lw*0.08,lx,ly,lw);
    cg.addColorStop(0,c.ca[ci]);cg.addColorStop(0.6,c.ca[Math.max(ci-1,0)]);cg.addColorStop(1,c.ca[0]);
    ctx.beginPath();ctx.ellipse(lx,ly,lw*0.58,lh*0.58,0,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  }
  ctx.restore();
}

// ── DRAW FERN ────────────────────────────────────────────
function drawFern(ctx,f){
  const sw=f.pos*1.8,a=f.opacity*(0.5+0.5*Math.sin(performance.now()*0.00036+f.phase));
  ctx.save();ctx.translate(f.scrollX+sw,f.y);ctx.globalAlpha=a;
  ctx.strokeStyle=`hsl(${f.hue},48%,19%)`;ctx.lineWidth=0.85;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(sw*0.10,-f.size*0.70);ctx.stroke();
  const frondCount=Math.max(2,f.fronds);
  for(let i=0;i<frondCount;i++){
    const ti=i/(frondCount-1),fy=-f.size*0.1-ti*f.size*0.56,fl=f.size*(0.14+ti*0.30);
    for(const s of[-1,1]){
      ctx.beginPath();ctx.moveTo(sw*0.06*ti,fy);
      ctx.quadraticCurveTo(s*fl*0.48+sw*0.012*ti,fy-fl*0.26,s*fl+sw*s*0.035,fy-fl*0.05);
      ctx.strokeStyle=`hsl(${f.hue+s*4},54%,${21+ti*11}%)`;ctx.lineWidth=0.60-ti*0.16;ctx.stroke();
    }
  }
  ctx.restore();
}

// ── BIRDS ────────────────────────────────────────────────
let birdPanner=null;

function spawnGroup(goRight, speedScale, now){
  const [c0,c1]=CROSS_S[trackingMode];
  // crossMs: time in ms for bird to cross the full screen width — framerate independent
  const crossMs=rnd(c0,c1)/speedScale*1000;
  const pxPerMs=W/crossMs;
  const settle=trackingMode==='settle';
  const n=Math.random()<(settle?0.2:0.35)?Math.floor(rnd(2,settle?2:3)):1;
  const gY=H*rnd(settle?0.12:0.25,settle?0.56:0.50);
  const gVy=rnd(settle?0.05:0.01,settle?0.14:0.04)*(Math.random()>0.5?1:-1);
  const gF=rnd(0,Math.PI*2),gG=rnd(0,Math.PI*2);
  const startX=goRight?-80:W+80;
  const pxPerMsSigned=goRight?pxPerMs:-pxPerMs;
  for(let i=0;i<n;i++){
    birds.push({
      x:startX+i*rnd(10,22)*(goRight?-1:1),
      y:gY+i*rnd(10,20)*(Math.random()>0.5?1:-1),
      vy:gVy,pxPerMs:pxPerMsSigned,
      wP:gF+i*0.35,fR:rnd(0.10,0.16),
      gP:gG+i*0.28,gR:rnd(0.005,0.012),
      sz:rnd(settle?26:16,settle?40:24),
      lW:rnd(0.94,1.0),rW:rnd(0.88,0.96),
      op:rnd(0.78,0.95),done:false
    });
  }

  if(now!==undefined&&isSession){
    const exitX=goRight?W+80:-80;
    // Pure ms calculation — works at any framerate
    const msToExit=Math.abs((exitX-startX)/pxPerMs);
    // Spawn next group when current is 52% through its journey (settle) or 48% (focus)
    // This is proportional to actual travel time so works on any device/screen size
    const earlyFraction=trackingMode==='settle'?0.52:0.48;
    nextBirdT=now+msToExit*(1-earlyFraction);
    crossedSpawned=false;
  }
}

function drawBird(ctx,b){
  ctx.save();ctx.translate(b.x,b.y);ctx.scale(b.pxPerMs>0?1:-1,1);ctx.globalAlpha=b.op;
  const gl=Math.sin(b.gP)*0.5+0.5;
  const wY=-(Math.sin(b.wP)*b.sz*0.58*(1-gl*0.60)+gl*b.sz*0.14);
  ctx.fillStyle='rgba(218,210,195,0.92)';
  ctx.save();ctx.rotate(-0.04);
  ctx.beginPath();ctx.ellipse(b.sz*0.07,0,b.sz*0.50,b.sz*0.13,0,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.beginPath();ctx.arc(b.sz*0.50,-b.sz*0.04,b.sz*0.09,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(-b.sz*0.03,0);
  ctx.quadraticCurveTo(-b.sz*0.50*b.lW,wY*0.88,-b.sz*0.86*b.lW,wY*0.40);
  ctx.quadraticCurveTo(-b.sz*0.38*b.lW,wY*0.18,-b.sz*0.03,0);ctx.fill();
  ctx.beginPath();ctx.moveTo(-b.sz*0.03,0);
  ctx.quadraticCurveTo(-b.sz*0.44*b.rW,wY*0.80,-b.sz*0.76*b.rW,wY*0.34);
  ctx.quadraticCurveTo(-b.sz*0.32*b.rW,wY*0.14,-b.sz*0.03,0);ctx.fill();
  const tD=gl*b.sz*0.08;
  ctx.beginPath();ctx.moveTo(-b.sz*0.44,0);
  ctx.lineTo(-b.sz*0.70,b.sz*0.05+tD);ctx.lineTo(-b.sz*0.60,b.sz*0.13+tD);
  ctx.closePath();ctx.fill();
  ctx.restore();
}

// ── MAIN LOOP ────────────────────────────────────────────
let lateralT=0,gusts=[],nextGustT=0;
function scheduleGust(now){nextGustT=now+rnd(6000,18000)}
function spawnGust(now){
  gusts.push({dir:Math.random()>0.5?1:-1,prog:0,str:rnd(0.3,0.65),t0:now});
  scheduleGust(now);
}

let lastMainT=0;
function mainLoop(now){
  requestAnimationFrame(mainLoop);
  if(!W||!H)return;
  const dt=lastMainT?Math.min(now-lastMainT,64):16; // cap at 64ms to avoid jumps
  lastMainT=now;

  palDrift+=0.0000038;palT=0.5+0.48*Math.sin(palDrift)*Math.cos(palDrift*0.37);
  const pal=getPal(),[rr,rg,rb]=pal.ray;

  const spd=ENV_SPD*(isSession?1.0:IDLE_DRIFT);
  bgTrees.forEach(t=>{t.scrollX-=spd*0.12;if(t.scrollX<-t.w*0.7)t.scrollX+=W+t.w*1.4});
  midTrees.forEach(t=>{t.scrollX-=spd*0.40;if(t.scrollX<-t.w*0.7)t.scrollX+=W+t.w*1.4});
  fgTrees.forEach(t=>{t.scrollX-=spd*0.90;if(t.scrollX<-t.w*0.7)t.scrollX+=W+t.w*1.4});
  ferns.forEach(f=>{f.scrollX-=spd*0.80;if(f.scrollX<-f.size*0.7)f.scrollX+=W+f.size*1.4});

  updatePhysics(now);

  const bMod=0.58+lightWave*0.42,aMod=0.82+lightWave*0.18,gP=0.92+breathWave*0.08;
  lateralT+=0.000020*(isSession?1.0:IDLE_DRIFT);
  const lat=Math.sin(lateralT)*0.09+Math.sin(lateralT*0.41+1.2)*0.04;

  if(now>=nextGustT)spawnGust(now);
  gusts=gusts.filter(g=>g.prog<1);
  gusts.forEach(g=>{
    // apply gust as an extra lateral nudge to physics wind field
    g.prog=Math.min(1,(now-g.t0)/3000);
  });

  // BG
  bgX.clearRect(0,0,W,H);
  const sk=bgX.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,pal.sT);sk.addColorStop(0.45,pal.sM);sk.addColorStop(1,pal.sL);
  bgX.fillStyle=sk;bgX.fillRect(0,0,W,H);

  rays.forEach((r,ri)=>{
    const bd=(ri%2===0)?1:-1;
    const drift=Math.sin(now*r.dr1+r.ph)*r.da1+Math.sin(now*r.dr2+r.ph*1.6)*r.da2+lat*bd;
    const rx=(r.x+drift)*W,pulse=(0.6+0.4*Math.sin(now*0.00015+r.ph))*bMod;
    bgX.save();bgX.translate(rx,0);bgX.rotate(r.angle);
    const gr=bgX.createLinearGradient(0,0,0,H*0.84);
    gr.addColorStop(0,`rgba(${rr},${rg},${rb},${(r.op*pulse*1.15).toFixed(3)})`);
    gr.addColorStop(0.5,`rgba(${rr},${rg},${rb},${(r.op*pulse*0.38).toFixed(3)})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    bgX.fillStyle=gr;bgX.fillRect(-r.w/2,0,r.w,H*0.84);bgX.restore();
  });

  bgTrees.forEach(t=>drawTree(bgX,t));

  motes.forEach(m=>{
    const mx=(m.x+Math.sin(now*m.sxR+m.ph)*W*0.048)%W;
    const my=(m.y+Math.cos(now*m.syR+m.ph)*H*0.033)%H;
    bgX.beginPath();bgX.arc(mx,my,m.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(${rr+38},${rg+42},${rb+38},${(m.op*aMod*(0.38+0.62*Math.sin(now*0.00024+m.ph))).toFixed(3)})`;
    bgX.fill();
  });

  const hz=bgX.createLinearGradient(0,H*0.48,0,H);
  hz.addColorStop(0,'rgba(0,0,0,0)');
  hz.addColorStop(0.2,`rgba(${rr*0.10|0},${rg*0.12|0},${rb*0.10|0},${(0.082*aMod).toFixed(3)})`);
  hz.addColorStop(1,`rgba(2,8,4,${(0.95*gP).toFixed(3)})`);
  bgX.fillStyle=hz;bgX.fillRect(0,H*0.48,W,H);

  // MID
  midX.clearRect(0,0,W,H);midTrees.forEach(t=>drawTree(midX,t));

  // FG
  fgX.clearRect(0,0,W,H);
  ferns.forEach(f=>drawFern(fgX,f));
  fgTrees.forEach(t=>drawTree(fgX,t));

  // ── BIRD SCHEDULING ────────────────────────────────────
  // nextBirdT is set precisely by spawnGroup based on the bird's actual speed,
  // so the next group spawns exactly when the current one exits. No guesswork.
  const bSpd=isSession?1.0:IDLE_BS;

  // idle mode: use bIV interval, no seamless chaining needed
  const bIV=CROSS_IV[trackingMode]/IDLE_BI;
  if(!birds.find(b=>!b.done)&&now>=nextBirdT){
    spawnGroup(birdDir,bSpd,isSession?now:undefined);
    if(!isSession)nextBirdT=now+bIV*rnd(0.80,1.30);
    birdDir=!birdDir;
  }

  if(actx&&birdPanner){
    const pl=birds.find(b=>!b.done);
    if(pl){
      const depth=trackingMode==='focus'?0.52:0.28,lag=trackingMode==='focus'?0.22:0.48;
      birdPanner.pan.setTargetAtTime(Math.max(-1,Math.min(1,((pl.x/W)*2-1)*depth)),actx.currentTime,lag);
    }
  }

  birds.forEach(b=>{
    b.x+=b.pxPerMs*dt;b.y+=b.vy;b.wP+=b.fR;b.gP+=b.gR;
    if(b.x<-(b.sz*2+80)||b.x>W+(b.sz*2+80))b.done=true;
    else drawBird(fgX,b);
  });
  birds=birds.filter(b=>!b.done);

  const fg2=fgX.createLinearGradient(0,H*0.68,0,H);
  fg2.addColorStop(0,'rgba(2,8,4,0)');fg2.addColorStop(1,'rgba(2,8,4,0.98)');
  fgX.fillStyle=fg2;fgX.fillRect(0,H*0.68,W,H);
}

// ── BREATH ───────────────────────────────────────────────
const PW=[{w:1600},{w:200},{w:800},{w:600},{w:7000},{w:800}];
const WT=PW.reduce((s,p)=>s+p.w,0),PI2=Math.PI*2;
let tCycleMs=12000,sCycleMs=12000,breathT=0,lastBTS=null,breathRaf;
let lightWave=0,soundWave=0,motionWave=0,breathWave=0,microV=0;

function breathLoop(ts){
  breathRaf=requestAnimationFrame(breathLoop);
  if(!lastBTS){lastBTS=ts;return}
  const dt=ts-lastBTS;lastBTS=ts;
  sCycleMs+=(tCycleMs-sCycleMs)*0.018;
  microV+=(Math.random()-0.5)*0.000095;microV=Math.max(-0.02,Math.min(0.02,microV));
  breathT=(breathT+dt*(WT/sCycleMs)*(1+microV))%WT;
  const bp=breathT/WT;
  breathWave=Math.sin(bp*PI2);lightWave=Math.sin((bp+0.05)*PI2);
  soundWave=Math.sin((bp-0.03+1)*PI2);motionWave=Math.sin((bp-0.02+1)*PI2);
  const inh=(soundWave+1)/2,exh=1-inh;
  if(actx&&gains.drone){
    gains.drone.gain.setTargetAtTime(SL[sndLvl].drone*(0.55+exh*0.88),actx.currentTime,1.3);
    if(dOsc)dOsc.frequency.setTargetAtTime(dOsc._bf+inh*7+dDrift,actx.currentTime,2.8);
  }
  if(actx&&gains.wind)gains.wind.gain.setTargetAtTime(SL[sndLvl].wind*(0.60+exh*0.68),actx.currentTime,1.9);
  if(actx&&gains.stream&&sFilt){
    gains.stream.gain.setTargetAtTime(SL[sndLvl].stream*(0.50+exh*0.88),actx.currentTime,1.3);
    sFilt.frequency.setTargetAtTime(240+exh*300,actx.currentTime,1.1);
  }
}

// ── AUDIO ────────────────────────────────────────────────
let actx,gains={},dOsc=null,sFilt=null,dDrift=0;
const SL={off:{drone:0,wind:0,stream:0},soft:{drone:0.017,wind:0.011,stream:0.009},on:{drone:0.032,wind:0.026,stream:0.020}};
let sndLvl='soft';

function noiseBuffer(s=4){
  const len=actx.sampleRate*s|0,buf=actx.createBuffer(2,len,actx.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);let lv=0;
    for(let i=0;i<len;i++){const w=Math.random()*2-1;lv=0.98*lv+0.02*w;d[i]=lv*8;}}
  return buf;
}

function buildAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  ['drone','wind','stream','shimmer'].forEach(k=>{gains[k]=actx.createGain();gains[k].gain.value=0;gains[k].connect(actx.destination)});
  [{f:98,pan:-0.26,rel:1.0},{f:101,pan:0.26,rel:1.0},{f:147,pan:0,rel:0.26},{f:196,pan:0,rel:0.14},{f:72,pan:0,rel:0.09}].forEach(s=>{
    const o=actx.createOscillator();o.type='triangle';o.frequency.value=s.f;o._bf=s.f;
    const lfo=actx.createOscillator(),lg=actx.createGain();
    lfo.frequency.value=rnd(0.044,0.066);lg.gain.value=rnd(260,460);
    lfo.connect(lg);lg.connect(o.detune);lfo.start();
    const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=360;lp.Q.value=0.55;
    const pan=actx.createStereoPanner();pan.pan.value=s.pan;
    const rg=actx.createGain();rg.gain.value=s.rel;
    o.connect(lp);lp.connect(rg);rg.connect(pan);pan.connect(gains.drone);o.start();
    if(!dOsc)dOsc=o;
  });
  let dt=0;const r1=rnd(0.00008,0.00014),r2=rnd(0.00020,0.00035);
  (function tick(){dt+=0.016;dDrift=Math.sin(dt*r1)*7+Math.sin(dt*r2)*3.5;setTimeout(tick,16)})();
  const ws=actx.createBufferSource();ws.buffer=noiseBuffer(6);ws.loop=true;
  const wl1=actx.createBiquadFilter();wl1.type='lowpass';wl1.frequency.value=260;wl1.Q.value=0.5;
  const wl2=actx.createBiquadFilter();wl2.type='lowpass';wl2.frequency.value=140;wl2.Q.value=0.4;
  const wlfo=actx.createOscillator(),wlg=actx.createGain();
  wlfo.frequency.value=0.036;wlg.gain.value=0.11;wlfo.connect(wlg);wlg.connect(gains.wind.gain);wlfo.start();
  ws.connect(wl1);wl1.connect(wl2);wl2.connect(gains.wind);ws.start();
  const ss=actx.createBufferSource();ss.buffer=noiseBuffer(5);ss.loop=true;
  sFilt=actx.createBiquadFilter();sFilt.type='bandpass';sFilt.frequency.value=290;sFilt.Q.value=0.42;
  const slfo=actx.createOscillator(),slg=actx.createGain();
  slfo.frequency.value=0.13;slg.gain.value=46;slfo.connect(slg);slg.connect(sFilt.frequency);
  ss.connect(sFilt);sFilt.connect(gains.stream);ss.start();slfo.start();
  const sh=actx.createBufferSource();sh.buffer=noiseBuffer(4);sh.loop=true;
  const shp=actx.createBiquadFilter();shp.type='highpass';shp.frequency.value=1900;shp.Q.value=0.38;
  const shlp=actx.createBiquadFilter();shlp.type='lowpass';shlp.frequency.value=4200;shlp.Q.value=0.28;
  const shg=actx.createGain();shg.gain.value=0.22;
  sh.connect(shp);shp.connect(shlp);shlp.connect(shg);shg.connect(gains.shimmer);sh.start();
  const hrm=[220,330,440,293,196,165];
  (function evt(){
    if(!actx||actx.state==='closed')return;
    const t=actx.currentTime+rnd(0.2,0.8),base=hrm[Math.floor(Math.random()*hrm.length)]*rnd(0.92,1.08);
    for(let i=0;i<Math.floor(rnd(1,3));i++){
      const o=actx.createOscillator(),g=actx.createGain();
      const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=rnd(550,1100);
      const dy=actx.createDelay(2.0);dy.delayTime.value=rnd(0.08,0.20);
      const dg=actx.createGain();dg.gain.value=0.30;
      o.type='triangle';
      o.frequency.setValueAtTime(base*rnd(0.91,1.09),t+i*0.14);
      o.frequency.exponentialRampToValueAtTime(base*rnd(0.58,1.38),t+i*0.14+rnd(0.12,0.38));
      g.gain.setValueAtTime(0,t+i*0.14);
      g.gain.linearRampToValueAtTime(rnd(0.007,0.016),t+i*0.14+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.14+rnd(0.28,0.75));
      o.connect(lp);lp.connect(g);g.connect(actx.destination);g.connect(dy);dy.connect(dg);dg.connect(actx.destination);
      o.start(t+i*0.14);o.stop(t+i*0.14+1.1);
    }
    setTimeout(evt,rnd(14000,48000));
  })();
  birdPanner=actx.createStereoPanner();
  const bn=actx.createBufferSource();bn.buffer=noiseBuffer(3);bn.loop=true;
  const bbp=actx.createBiquadFilter();bbp.type='bandpass';bbp.frequency.value=600;bbp.Q.value=0.45;
  const bg2=actx.createGain();bg2.gain.value=0.003;
  bn.connect(bbp);bbp.connect(bg2);bg2.connect(birdPanner);birdPanner.connect(actx.destination);bn.start();
  const ano=actx.currentTime,lvl=SL[sndLvl];
  gains.drone.gain.linearRampToValueAtTime(lvl.drone,ano+10);
  gains.wind.gain.linearRampToValueAtTime(lvl.wind,ano+10);
  gains.stream.gain.linearRampToValueAtTime(lvl.stream,ano+10);
  gains.shimmer.gain.linearRampToValueAtTime(lvl.drone*0.28,ano+14);
}

function setSound(lvl){
  sndLvl=lvl;
  ['off','soft','on'].forEach(k=>document.getElementById('sv-'+k).classList.toggle('on',k===lvl));
  if(!actx)return;
  const l=SL[lvl],t=actx.currentTime;
  gains.drone.gain.setTargetAtTime(l.drone,t,2.2);gains.wind.gain.setTargetAtTime(l.wind,t,2.2);
  gains.stream.gain.setTargetAtTime(l.stream,t,2.2);gains.shimmer.gain.setTargetAtTime(l.drone*0.28,t,2.2);
}

// ── CONTROLS ─────────────────────────────────────────────
let panelOpen=false,listenMode=false;

function setTracking(mode){
  trackingMode=mode;
  document.getElementById('tr-settle').classList.toggle('on',mode==='settle');
  document.getElementById('tr-focus').classList.toggle('on',mode==='focus');
  nextBirdT=performance.now()+CROSS_IV[mode]*rnd(0.4,0.8);
}
function setListenMode(on){
  listenMode=on;
  document.getElementById('md-forest').classList.toggle('on',!on);
  document.getElementById('md-listen').classList.toggle('on',on);
  const a=on?'0':'1';
  [bgC,midC,fgC].forEach(c=>c.style.opacity=a);
  document.getElementById('vignette').style.opacity=a;
}
function togglePanel(){
  panelOpen=!panelOpen;
  document.getElementById('panel').classList.toggle('hid',!panelOpen);
}

// ── INTERWEAVES ──────────────────────────────────────────
const IW={
  som:["the body knows how to rest"],
  cog:["thoughts can pass like birds"]
};
let iwT=null;
function scheduleIW(){
  if(Math.random()>0.60)return;
  iwT=setTimeout(()=>{
    const pool=Math.random()>0.5?IW.cog:IW.som;
    const g3=document.getElementById('g3');
    g3.textContent=pool[Math.floor(Math.random()*pool.length)];
    g3.classList.add('on');setTimeout(()=>g3.classList.remove('on'),5500);
  },rnd(2*60,5*60)*1000);
}

// ── SCREENS ──────────────────────────────────────────────
function showScreen(id){
  ['entry','session','closing'].forEach(s=>{
    document.getElementById(s).classList.toggle('vis',s===id);
    document.getElementById(s).classList.toggle('hid',s!==id);
  });
}

function enterForest(){
  buildAudio();
  if(actx.state==='suspended')actx.resume();
  showScreen('session');
  cur.classList.add('off');
  isSession=true;
  breathT=0;lastBTS=null;sCycleMs=tCycleMs;
  breathWave=0;lightWave=0;soundWave=0;motionWave=0;microV=0;
  birds=[];birdDir=true;crossedSpawned=false;
  const now=performance.now();
  scheduleGust(now);
  spawnGroup(birdDir,1.0,now);
  birdDir=!birdDir;
  const g1=document.getElementById('g1'),g2=document.getElementById('g2'),g3=document.getElementById('g3');
  g1.classList.remove('on');g2.classList.remove('on');g3.classList.remove('on');g3.textContent='';
  setTimeout(()=>g1.classList.add('on'),600);
  setTimeout(()=>g2.classList.add('on'),1800);
  setTimeout(()=>{g1.classList.remove('on');g2.classList.remove('on')},5500);
  clearTimeout(iwT);scheduleIW();
}

function endSession(){
  isSession=false;setListenMode(false);cur.classList.remove('off');
  clearTimeout(iwT);
  // Cancel current breath loop before restarting to prevent double-running
  cancelAnimationFrame(breathRaf);
  lastBTS=null; // reset so the restarted loop doesn't get a huge dt spike
  breathRaf=requestAnimationFrame(breathLoop);
  showScreen('closing');
}
function returnEntry(){
  isSession=false; // ensure clean state if somehow called from session
  setListenMode(false);cur.classList.remove('off');
  if(actx){actx.close();actx=null;gains={};dOsc=null;sFilt=null;birdPanner=null;}
  showScreen('entry');
}

// ── WIRE BUTTONS ─────────────────────────────────────────
document.getElementById('enter-btn').addEventListener('click',enterForest);
document.getElementById('leave-btn').addEventListener('click',endSession);
document.getElementById('return-btn').addEventListener('click',returnEntry);
document.getElementById('settings-btn').addEventListener('click',togglePanel);
document.getElementById('tr-settle').addEventListener('click',()=>setTracking('settle'));
document.getElementById('tr-focus').addEventListener('click',()=>setTracking('focus'));
document.getElementById('sv-off').addEventListener('click',()=>setSound('off'));
document.getElementById('sv-soft').addEventListener('click',()=>setSound('soft'));
document.getElementById('sv-on').addEventListener('click',()=>setSound('on'));
document.getElementById('md-forest').addEventListener('click',()=>setListenMode(false));
document.getElementById('md-listen').addEventListener('click',()=>setListenMode(true));

// ── BOOT ─────────────────────────────────────────────────
resize();
requestAnimationFrame(mainLoop);
requestAnimationFrame(breathLoop);
scheduleGust(performance.now());
nextBirdT=performance.now()+600;
</script>
